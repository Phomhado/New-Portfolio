name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Or any other branch you use for production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'  # Specify the Node.js version

    - name: Install dependencies
      run: npm install

    - name: Build the site
      run: npm run build  # Use the build command for your project (e.g., `npm run build` for Next.js)

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages  # This is where the site will be deployed
        folder: .next/output  # For Next.js; for others, it might be the `dist` or `build` folder
        token: ${{ secrets.GITHUB_TOKEN }}
